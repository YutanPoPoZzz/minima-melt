<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- jet-black circular chamber -->
  <circle cx="32" cy="32" r="32" fill="#07040b" />
  <!-- bubble-letter "M" throw-up: fat rounded outer outline, white line-art -->
  <path d="M 12 44.5
           C 9.5 38 9 26 14 19.5
           C 17 15.5 21 13.5 24 15
           C 28 17 30.5 20 32 22.5
           C 33.5 20 36 17 40 15
           C 43 13.5 47 15.5 50 19.5
           C 55 26 54.5 38 52 44.5
           C 48 46.8 44 46 42.5 43.5
           C 41 40 40 34 39.5 30.5
           C 37 33.5 34 38 32 39.5
           C 30 38 27 33.5 24.5 30.5
           C 24 34 23 40 21.5 43.5
           C 20 46 16 46.8 12 44.5 Z"
        fill="none" stroke="#f1eaf8" stroke-width="1.9" stroke-linejoin="round" />
  <!-- the inner echo line of the throw-up, glowing violet -->
  <path d="M 12 44.5
           C 9.5 38 9 26 14 19.5
           C 17 15.5 21 13.5 24 15
           C 28 17 30.5 20 32 22.5
           C 33.5 20 36 17 40 15
           C 43 13.5 47 15.5 50 19.5
           C 55 26 54.5 38 52 44.5
           C 48 46.8 44 46 42.5 43.5
           C 41 40 40 34 39.5 30.5
           C 37 33.5 34 38 32 39.5
           C 30 38 27 33.5 24.5 30.5
           C 24 34 23 40 21.5 43.5
           C 20 46 16 46.8 12 44.5 Z"
        transform="translate(32 31) scale(0.74) translate(-32 -31)"
        fill="none" stroke="#a34dff" stroke-width="1.3" opacity="0.8" />
  <!-- the luminous violet heart in the letter's window -->
  <circle cx="32" cy="30.5" r="3.4" fill="#a34dff" />
  <!-- paint-runs threading off the letter's lower edge, beads falling -->
  <g stroke="#d9b3ff" stroke-width="1.4" stroke-linecap="round" fill="none">
    <path d="M 21.5 46.5 Q 22 50 21.5 52.5" />
    <path d="M 43 46 Q 43.4 48.6 43 50.4" />
  </g>
  <circle cx="21.5" cy="54.5" r="1.7" fill="#a34dff" />
  <circle cx="43" cy="52.2" r="1.4" fill="#d9b3ff" />
  <!-- a stray spray splat glowing in the dark -->
  <path d="M 51 13 L 52.2 15.4 L 54.8 15.8 L 52.8 17.5 L 53.4 20 L 51 18.8 L 48.6 20 L 49.2 17.5 L 47.2 15.8 L 49.8 15.4 Z"
        fill="none" stroke="#d9b3ff" stroke-width="1.1" stroke-linejoin="round" opacity="0.8" />
  <!-- a grain of drifting mist -->
  <circle cx="13" cy="18" r="1.3" fill="#f1eaf8" />
</svg>
