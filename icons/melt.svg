<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- jet-black circular chamber -->
  <circle cx="32" cy="32" r="32" fill="#07040b" />
  <!-- the molten lump: white line-art blob, wobbling on top, sagging below -->
  <path d="M 32 15.5
           C 38.5 15.5 44 19.5 44.5 25.5
           C 45 30.5 42.5 34 42 38
           C 41.6 41.5 39.5 44.5 35.5 45.5
           C 32.5 46.2 30.5 45 28.5 45.8
           C 25 47.2 20.5 45 19.5 40.5
           C 18.7 37 20.5 34.5 19.8 31
           C 19 27 20 21.5 24 18.5
           C 26.4 16.7 29 15.5 32 15.5 Z"
        fill="none" stroke="#f1eaf8" stroke-width="1.8" stroke-linejoin="round" />
  <!-- the luminous violet heart -->
  <circle cx="31.5" cy="30" r="5" fill="#a34dff" />
  <circle cx="31.5" cy="30" r="8.6" fill="none" stroke="#d9b3ff" stroke-width="1.2" opacity="0.55" />
  <!-- drips: threads of light stretching off the underside, beads falling -->
  <g stroke="#d9b3ff" stroke-width="1.4" stroke-linecap="round" fill="none">
    <path d="M 27 46.5 Q 27.5 50 27 52.5" />
    <path d="M 37 46 Q 37.4 48.4 37 50" />
  </g>
  <circle cx="27" cy="54.5" r="1.7" fill="#a34dff" />
  <circle cx="37" cy="51.8" r="1.4" fill="#d9b3ff" />
  <!-- a splashed droplet flying free, trailing lavender light -->
  <circle cx="49" cy="16.5" r="2" fill="none" stroke="#a34dff" stroke-width="1.4" />
  <path d="M 45.6 20 L 43 22.6" stroke="#d9b3ff" stroke-width="1.3" stroke-linecap="round" />
  <!-- a stray white bead in the dark -->
  <circle cx="13.5" cy="20" r="1.4" fill="#f1eaf8" />
</svg>
