  <path d="M 20.2 43 C 22.3 45 22.7 47 20.2 49.3 C 17.7 47 18.1 45 20.2 43 Z" fill="#a34dff" />
  <path d="M 32.2 37 C 33.9 38.6 34.2 40.2 32.2 42 C 30.2 40.2 30.5 38.6 32.2 37 Z" fill="#d9b3ff" />
