           C 28 9.5 30.5 12 32 14
           C 33.5 12 36 9.5 39.5 7.5
           C 42.5 6 46 7.5 49 10.5
           C 54 15.5 53.5 24.5 51 30
           C 47 32 43.5 31.2 42 29
           C 40.5 26 40 21.5 39.5 18.5
           C 37 21.5 34 25 32 26.5
           C 30 25 27 21.5 24.5 18.5
